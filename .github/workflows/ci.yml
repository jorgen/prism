name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan
            flags: -fsanitize=address -fno-omit-frame-pointer
            linker: -fsanitize=address
          - name: tsan
            flags: -fsanitize=thread -fno-omit-frame-pointer
            linker: -fsanitize=thread
          - name: ubsan
            flags: -fsanitize=undefined -fno-omit-frame-pointer -fno-sanitize-recover=all
            linker: -fsanitize=undefined
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 ninja-build cmake git ca-certificates ccache

      - name: Cache 3rdparty dependencies
        uses: actions/cache@v4
        with:
          path: 3rdparty
          key: 3rdparty-${{ hashFiles('CMake/3rdPartyPackages.cmake', 'CMakeLists.txt') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.name }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.name }}-

      - name: Configure
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          ccache --zero-stats
          cmake -G Ninja -B build-${{ matrix.name }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker }}"

      - name: Build
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          cmake --build build-${{ matrix.name }}
          ccache --show-stats

      - name: Test
        run: ctest --test-dir build-${{ matrix.name }} --output-on-failure
